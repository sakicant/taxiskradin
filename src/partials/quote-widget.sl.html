      <div class="quote-widget" id="quote-widget">
        <div class="quote-trip-toggle">
          <button type="button" class="trip-toggle-btn active" data-trip="oneway">Enosmerno</button>
          <button type="button" class="trip-toggle-btn" data-trip="return">Povratno</button>
        </div>

        <div class="quote-field">
          <label for="quote-from-input">Od</label>
          <div class="combo" data-placeholder="Kraj prevzema">
            <input type="text" class="combo-input" id="quote-from-input" placeholder="Kraj prevzema" autocomplete="off" role="combobox" aria-expanded="false" aria-autocomplete="list">
            <input type="hidden" id="quote-from">
            <div class="combo-panel" hidden></div>
          </div>
        </div>
        <div class="quote-field">
          <label for="quote-to-input">Do</label>
          <div class="combo" data-placeholder="Cilj">
            <input type="text" class="combo-input" id="quote-to-input" placeholder="Cilj" autocomplete="off" role="combobox" aria-expanded="false" aria-autocomplete="list">
            <input type="hidden" id="quote-to">
            <div class="combo-panel" hidden></div>
          </div>
        </div>

        <div class="quote-field-row">
          <div class="quote-stepper">
            <label>Potniki</label>
            <div class="stepper-control">
              <button type="button" class="stepper-btn" data-target="quote-passengers" data-delta="-1" aria-label="Zmanjšaj število potnikov">&minus;</button>
              <span id="quote-passengers" data-value="1" data-min="1" data-max="12">1</span>
              <button type="button" class="stepper-btn" data-target="quote-passengers" data-delta="1" aria-label="Povečaj število potnikov">+</button>
            </div>
          </div>
          <div class="quote-stepper">
            <label>Prtljaga</label>
            <div class="stepper-control">
              <button type="button" class="stepper-btn" data-target="quote-luggage" data-delta="-1" aria-label="Zmanjšaj prtljago">&minus;</button>
              <span id="quote-luggage" data-value="1" data-min="0" data-max="6">1</span>
              <button type="button" class="stepper-btn" data-target="quote-luggage" data-delta="1" aria-label="Povečaj prtljago">+</button>
            </div>
          </div>
        </div>

        <button type="button" id="quote-submit" class="btn btn-primary quote-btn">Poglej fiksno ceno</button>

        <div id="quote-result" class="quote-result" hidden></div>
      </div>
