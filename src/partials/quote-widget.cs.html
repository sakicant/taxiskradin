      <div class="quote-widget" id="quote-widget">
        <div class="quote-trip-toggle">
          <button type="button" class="trip-toggle-btn active" data-trip="oneway">Jednosměrná</button>
          <button type="button" class="trip-toggle-btn" data-trip="return">Zpáteční</button>
        </div>

        <div class="quote-field">
          <label for="quote-from-input">Odkud</label>
          <div class="combo" data-placeholder="Místo vyzvednutí">
            <input type="text" class="combo-input" id="quote-from-input" placeholder="Místo vyzvednutí" autocomplete="off" role="combobox" aria-expanded="false" aria-autocomplete="list">
            <input type="hidden" id="quote-from">
            <div class="combo-panel" hidden></div>
          </div>
        </div>
        <div class="quote-field">
          <label for="quote-to-input">Kam</label>
          <div class="combo" data-placeholder="Cíl">
            <input type="text" class="combo-input" id="quote-to-input" placeholder="Cíl" autocomplete="off" role="combobox" aria-expanded="false" aria-autocomplete="list">
            <input type="hidden" id="quote-to">
            <div class="combo-panel" hidden></div>
          </div>
        </div>

        <div class="quote-field-row">
          <div class="quote-stepper">
            <label>Cestující</label>
            <div class="stepper-control">
              <button type="button" class="stepper-btn" data-target="quote-passengers" data-delta="-1" aria-label="Snížit počet cestujících">&minus;</button>
              <span id="quote-passengers" data-value="1" data-min="1" data-max="12">1</span>
              <button type="button" class="stepper-btn" data-target="quote-passengers" data-delta="1" aria-label="Zvýšit počet cestujících">+</button>
            </div>
          </div>
          <div class="quote-stepper">
            <label>Zavazadla</label>
            <div class="stepper-control">
              <button type="button" class="stepper-btn" data-target="quote-luggage" data-delta="-1" aria-label="Snížit zavazadla">&minus;</button>
              <span id="quote-luggage" data-value="1" data-min="0" data-max="6">1</span>
              <button type="button" class="stepper-btn" data-target="quote-luggage" data-delta="1" aria-label="Zvýšit zavazadla">+</button>
            </div>
          </div>
        </div>

        <button type="button" id="quote-submit" class="btn btn-primary quote-btn">Zobrazit pevnou cenu</button>

        <div id="quote-result" class="quote-result" hidden></div>
      </div>
