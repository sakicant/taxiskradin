      <div class="quote-widget" id="quote-widget">
        <div class="quote-trip-toggle">
          <button type="button" class="trip-toggle-btn active" data-trip="oneway">One Way</button>
          <button type="button" class="trip-toggle-btn" data-trip="return">Return</button>
        </div>

        <div class="quote-field">
          <label for="quote-from-input">From</label>
          <div class="combo" data-placeholder="Pickup location">
            <input type="text" class="combo-input" id="quote-from-input" placeholder="Pickup location" autocomplete="off" role="combobox" aria-expanded="false" aria-autocomplete="list">
            <input type="hidden" id="quote-from">
            <div class="combo-panel" hidden></div>
          </div>
        </div>
        <div class="quote-field">
          <label for="quote-to-input">To</label>
          <div class="combo" data-placeholder="Destination">
            <input type="text" class="combo-input" id="quote-to-input" placeholder="Destination" autocomplete="off" role="combobox" aria-expanded="false" aria-autocomplete="list">
            <input type="hidden" id="quote-to">
            <div class="combo-panel" hidden></div>
          </div>
        </div>

        <div class="quote-field-row">
          <div class="quote-stepper">
            <label>Passengers</label>
            <div class="stepper-control">
              <button type="button" class="stepper-btn" data-target="quote-passengers" data-delta="-1" aria-label="Decrease passengers">&minus;</button>
              <span id="quote-passengers" data-value="1" data-min="1" data-max="12">1</span>
              <button type="button" class="stepper-btn" data-target="quote-passengers" data-delta="1" aria-label="Increase passengers">+</button>
            </div>
          </div>
          <div class="quote-stepper">
            <label>Luggage</label>
            <div class="stepper-control">
              <button type="button" class="stepper-btn" data-target="quote-luggage" data-delta="-1" aria-label="Decrease luggage">&minus;</button>
              <span id="quote-luggage" data-value="1" data-min="0" data-max="6">1</span>
              <button type="button" class="stepper-btn" data-target="quote-luggage" data-delta="1" aria-label="Increase luggage">+</button>
            </div>
          </div>
        </div>

        <button type="button" id="quote-submit" class="btn btn-primary quote-btn">See fixed price</button>

        <div id="quote-result" class="quote-result" hidden></div>
      </div>
