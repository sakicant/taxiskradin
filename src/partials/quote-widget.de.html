      <div class="quote-widget" id="quote-widget">
        <div class="quote-trip-toggle">
          <button type="button" class="trip-toggle-btn active" data-trip="oneway">Einfach</button>
          <button type="button" class="trip-toggle-btn" data-trip="return">Hin &amp; zurück</button>
        </div>

        <div class="quote-field">
          <label for="quote-from-input">Von</label>
          <div class="combo" data-placeholder="Abholort">
            <input type="text" class="combo-input" id="quote-from-input" placeholder="Abholort" autocomplete="off" role="combobox" aria-expanded="false" aria-autocomplete="list">
            <input type="hidden" id="quote-from">
            <div class="combo-panel" hidden></div>
          </div>
        </div>
        <div class="quote-field">
          <label for="quote-to-input">Nach</label>
          <div class="combo" data-placeholder="Zielort">
            <input type="text" class="combo-input" id="quote-to-input" placeholder="Zielort" autocomplete="off" role="combobox" aria-expanded="false" aria-autocomplete="list">
            <input type="hidden" id="quote-to">
            <div class="combo-panel" hidden></div>
          </div>
        </div>

        <div class="quote-field-row">
          <div class="quote-stepper">
            <label>Fahrgäste</label>
            <div class="stepper-control">
              <button type="button" class="stepper-btn" data-target="quote-passengers" data-delta="-1" aria-label="Fahrgäste verringern">&minus;</button>
              <span id="quote-passengers" data-value="1" data-min="1" data-max="12">1</span>
              <button type="button" class="stepper-btn" data-target="quote-passengers" data-delta="1" aria-label="Fahrgäste erhöhen">+</button>
            </div>
          </div>
          <div class="quote-stepper">
            <label>Gepäck</label>
            <div class="stepper-control">
              <button type="button" class="stepper-btn" data-target="quote-luggage" data-delta="-1" aria-label="Gepäck verringern">&minus;</button>
              <span id="quote-luggage" data-value="1" data-min="0" data-max="6">1</span>
              <button type="button" class="stepper-btn" data-target="quote-luggage" data-delta="1" aria-label="Gepäck erhöhen">+</button>
            </div>
          </div>
        </div>

        <button type="button" id="quote-submit" class="btn btn-primary quote-btn">Festpreis anzeigen</button>

        <div id="quote-result" class="quote-result" hidden></div>
      </div>
