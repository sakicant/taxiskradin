      <div class="quote-widget" id="quote-widget">
        <div class="quote-trip-toggle">
          <button type="button" class="trip-toggle-btn active" data-trip="oneway">Enkel resa</button>
          <button type="button" class="trip-toggle-btn" data-trip="return">Tur &amp; retur</button>
        </div>

        <div class="quote-field">
          <label for="quote-from-input">Från</label>
          <div class="combo" data-placeholder="Upphämtningsplats">
            <input type="text" class="combo-input" id="quote-from-input" placeholder="Upphämtningsplats" autocomplete="off" role="combobox" aria-expanded="false" aria-autocomplete="list">
            <input type="hidden" id="quote-from">
            <div class="combo-panel" hidden></div>
          </div>
        </div>
        <div class="quote-field">
          <label for="quote-to-input">Till</label>
          <div class="combo" data-placeholder="Destination">
            <input type="text" class="combo-input" id="quote-to-input" placeholder="Destination" autocomplete="off" role="combobox" aria-expanded="false" aria-autocomplete="list">
            <input type="hidden" id="quote-to">
            <div class="combo-panel" hidden></div>
          </div>
        </div>

        <div class="quote-field-row">
          <div class="quote-stepper">
            <label>Passagerare</label>
            <div class="stepper-control">
              <button type="button" class="stepper-btn" data-target="quote-passengers" data-delta="-1" aria-label="Minska antal passagerare">&minus;</button>
              <span id="quote-passengers" data-value="1" data-min="1" data-max="12">1</span>
              <button type="button" class="stepper-btn" data-target="quote-passengers" data-delta="1" aria-label="Öka antal passagerare">+</button>
            </div>
          </div>
          <div class="quote-stepper">
            <label>Bagage</label>
            <div class="stepper-control">
              <button type="button" class="stepper-btn" data-target="quote-luggage" data-delta="-1" aria-label="Minska bagage">&minus;</button>
              <span id="quote-luggage" data-value="1" data-min="0" data-max="6">1</span>
              <button type="button" class="stepper-btn" data-target="quote-luggage" data-delta="1" aria-label="Öka bagage">+</button>
            </div>
          </div>
        </div>

        <button type="button" id="quote-submit" class="btn btn-primary quote-btn">Se fast pris</button>

        <div id="quote-result" class="quote-result" hidden></div>
      </div>
