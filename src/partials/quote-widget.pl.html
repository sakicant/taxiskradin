      <div class="quote-widget" id="quote-widget">
        <div class="quote-trip-toggle">
          <button type="button" class="trip-toggle-btn active" data-trip="oneway">W jedną stronę</button>
          <button type="button" class="trip-toggle-btn" data-trip="return">W obie strony</button>
        </div>

        <div class="quote-field">
          <label for="quote-from-input">Skąd</label>
          <div class="combo" data-placeholder="Miejsce odbioru">
            <input type="text" class="combo-input" id="quote-from-input" placeholder="Miejsce odbioru" autocomplete="off" role="combobox" aria-expanded="false" aria-autocomplete="list">
            <input type="hidden" id="quote-from">
            <div class="combo-panel" hidden></div>
          </div>
        </div>
        <div class="quote-field">
          <label for="quote-to-input">Dokąd</label>
          <div class="combo" data-placeholder="Cel">
            <input type="text" class="combo-input" id="quote-to-input" placeholder="Cel" autocomplete="off" role="combobox" aria-expanded="false" aria-autocomplete="list">
            <input type="hidden" id="quote-to">
            <div class="combo-panel" hidden></div>
          </div>
        </div>

        <div class="quote-field-row">
          <div class="quote-stepper">
            <label>Pasażerowie</label>
            <div class="stepper-control">
              <button type="button" class="stepper-btn" data-target="quote-passengers" data-delta="-1" aria-label="Zmniejsz liczbę pasażerów">&minus;</button>
              <span id="quote-passengers" data-value="1" data-min="1" data-max="12">1</span>
              <button type="button" class="stepper-btn" data-target="quote-passengers" data-delta="1" aria-label="Zwiększ liczbę pasażerów">+</button>
            </div>
          </div>
          <div class="quote-stepper">
            <label>Bagaż</label>
            <div class="stepper-control">
              <button type="button" class="stepper-btn" data-target="quote-luggage" data-delta="-1" aria-label="Zmniejsz bagaż">&minus;</button>
              <span id="quote-luggage" data-value="1" data-min="0" data-max="6">1</span>
              <button type="button" class="stepper-btn" data-target="quote-luggage" data-delta="1" aria-label="Zwiększ bagaż">+</button>
            </div>
          </div>
        </div>

        <button type="button" id="quote-submit" class="btn btn-primary quote-btn">Zobacz stałą cenę</button>

        <div id="quote-result" class="quote-result" hidden></div>
      </div>
