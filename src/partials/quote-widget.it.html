      <div class="quote-widget" id="quote-widget">
        <div class="quote-trip-toggle">
          <button type="button" class="trip-toggle-btn active" data-trip="oneway">Solo andata</button>
          <button type="button" class="trip-toggle-btn" data-trip="return">Andata e ritorno</button>
        </div>

        <div class="quote-field">
          <label for="quote-from-input">Da</label>
          <div class="combo" data-placeholder="Luogo di partenza">
            <input type="text" class="combo-input" id="quote-from-input" placeholder="Luogo di partenza" autocomplete="off" role="combobox" aria-expanded="false" aria-autocomplete="list">
            <input type="hidden" id="quote-from">
            <div class="combo-panel" hidden></div>
          </div>
        </div>
        <div class="quote-field">
          <label for="quote-to-input">A</label>
          <div class="combo" data-placeholder="Destinazione">
            <input type="text" class="combo-input" id="quote-to-input" placeholder="Destinazione" autocomplete="off" role="combobox" aria-expanded="false" aria-autocomplete="list">
            <input type="hidden" id="quote-to">
            <div class="combo-panel" hidden></div>
          </div>
        </div>

        <div class="quote-field-row">
          <div class="quote-stepper">
            <label>Passeggeri</label>
            <div class="stepper-control">
              <button type="button" class="stepper-btn" data-target="quote-passengers" data-delta="-1" aria-label="Riduci passeggeri">&minus;</button>
              <span id="quote-passengers" data-value="1" data-min="1" data-max="12">1</span>
              <button type="button" class="stepper-btn" data-target="quote-passengers" data-delta="1" aria-label="Aumenta passeggeri">+</button>
            </div>
          </div>
          <div class="quote-stepper">
            <label>Bagagli</label>
            <div class="stepper-control">
              <button type="button" class="stepper-btn" data-target="quote-luggage" data-delta="-1" aria-label="Riduci bagagli">&minus;</button>
              <span id="quote-luggage" data-value="1" data-min="0" data-max="6">1</span>
              <button type="button" class="stepper-btn" data-target="quote-luggage" data-delta="1" aria-label="Aumenta bagagli">+</button>
            </div>
          </div>
        </div>

        <button type="button" id="quote-submit" class="btn btn-primary quote-btn">Vedi il prezzo fisso</button>

        <div id="quote-result" class="quote-result" hidden></div>
      </div>
