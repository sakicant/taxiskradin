      <div class="quote-widget" id="quote-widget">
        <div class="quote-trip-toggle">
          <button type="button" class="trip-toggle-btn active" data-trip="oneway">Jednosmerne</button>
          <button type="button" class="trip-toggle-btn" data-trip="return">Spiatočne</button>
        </div>

        <div class="quote-field">
          <label for="quote-from-input">Odkiaľ</label>
          <div class="combo" data-placeholder="Miesto vyzdvihnutia">
            <input type="text" class="combo-input" id="quote-from-input" placeholder="Miesto vyzdvihnutia" autocomplete="off" role="combobox" aria-expanded="false" aria-autocomplete="list">
            <input type="hidden" id="quote-from">
            <div class="combo-panel" hidden></div>
          </div>
        </div>
        <div class="quote-field">
          <label for="quote-to-input">Kam</label>
          <div class="combo" data-placeholder="Cieľ">
            <input type="text" class="combo-input" id="quote-to-input" placeholder="Cieľ" autocomplete="off" role="combobox" aria-expanded="false" aria-autocomplete="list">
            <input type="hidden" id="quote-to">
            <div class="combo-panel" hidden></div>
          </div>
        </div>

        <div class="quote-field-row">
          <div class="quote-stepper">
            <label>Cestujúci</label>
            <div class="stepper-control">
              <button type="button" class="stepper-btn" data-target="quote-passengers" data-delta="-1" aria-label="Menej cestujúcich">&minus;</button>
              <span id="quote-passengers" data-value="1" data-min="1" data-max="12">1</span>
              <button type="button" class="stepper-btn" data-target="quote-passengers" data-delta="1" aria-label="Viac cestujúcich">+</button>
            </div>
          </div>
          <div class="quote-stepper">
            <label>Batožina</label>
            <div class="stepper-control">
              <button type="button" class="stepper-btn" data-target="quote-luggage" data-delta="-1" aria-label="Menej batožiny">&minus;</button>
              <span id="quote-luggage" data-value="1" data-min="0" data-max="6">1</span>
              <button type="button" class="stepper-btn" data-target="quote-luggage" data-delta="1" aria-label="Viac batožiny">+</button>
            </div>
          </div>
        </div>

        <button type="button" id="quote-submit" class="btn btn-primary quote-btn">Zobraziť pevnú cenu</button>

        <div id="quote-result" class="quote-result" hidden></div>
      </div>
