      <div class="quote-widget" id="quote-widget">
        <div class="quote-trip-toggle">
          <button type="button" class="trip-toggle-btn active" data-trip="oneway">Egy irány</button>
          <button type="button" class="trip-toggle-btn" data-trip="return">Oda-vissza</button>
        </div>

        <div class="quote-field">
          <label for="quote-from-input">Honnan</label>
          <div class="combo" data-placeholder="Felvételi hely">
            <input type="text" class="combo-input" id="quote-from-input" placeholder="Felvételi hely" autocomplete="off" role="combobox" aria-expanded="false" aria-autocomplete="list">
            <input type="hidden" id="quote-from">
            <div class="combo-panel" hidden></div>
          </div>
        </div>
        <div class="quote-field">
          <label for="quote-to-input">Hová</label>
          <div class="combo" data-placeholder="Cél">
            <input type="text" class="combo-input" id="quote-to-input" placeholder="Cél" autocomplete="off" role="combobox" aria-expanded="false" aria-autocomplete="list">
            <input type="hidden" id="quote-to">
            <div class="combo-panel" hidden></div>
          </div>
        </div>

        <div class="quote-field-row">
          <div class="quote-stepper">
            <label>Utasok</label>
            <div class="stepper-control">
              <button type="button" class="stepper-btn" data-target="quote-passengers" data-delta="-1" aria-label="Utasok csökkentése">&minus;</button>
              <span id="quote-passengers" data-value="1" data-min="1" data-max="12">1</span>
              <button type="button" class="stepper-btn" data-target="quote-passengers" data-delta="1" aria-label="Utasok növelése">+</button>
            </div>
          </div>
          <div class="quote-stepper">
            <label>Csomag</label>
            <div class="stepper-control">
              <button type="button" class="stepper-btn" data-target="quote-luggage" data-delta="-1" aria-label="Csomag csökkentése">&minus;</button>
              <span id="quote-luggage" data-value="1" data-min="0" data-max="6">1</span>
              <button type="button" class="stepper-btn" data-target="quote-luggage" data-delta="1" aria-label="Csomag növelése">+</button>
            </div>
          </div>
        </div>

        <button type="button" id="quote-submit" class="btn btn-primary quote-btn">Fix ár megtekintése</button>

        <div id="quote-result" class="quote-result" hidden></div>
      </div>
