      <div class="quote-widget" id="quote-widget">
        <div class="quote-trip-toggle">
          <button type="button" class="trip-toggle-btn active" data-trip="oneway">Enkele reis</button>
          <button type="button" class="trip-toggle-btn" data-trip="return">Retour</button>
        </div>

        <div class="quote-field">
          <label for="quote-from-input">Van</label>
          <div class="combo" data-placeholder="Ophaallocatie">
            <input type="text" class="combo-input" id="quote-from-input" placeholder="Ophaallocatie" autocomplete="off" role="combobox" aria-expanded="false" aria-autocomplete="list">
            <input type="hidden" id="quote-from">
            <div class="combo-panel" hidden></div>
          </div>
        </div>
        <div class="quote-field">
          <label for="quote-to-input">Naar</label>
          <div class="combo" data-placeholder="Bestemming">
            <input type="text" class="combo-input" id="quote-to-input" placeholder="Bestemming" autocomplete="off" role="combobox" aria-expanded="false" aria-autocomplete="list">
            <input type="hidden" id="quote-to">
            <div class="combo-panel" hidden></div>
          </div>
        </div>

        <div class="quote-field-row">
          <div class="quote-stepper">
            <label>Passagiers</label>
            <div class="stepper-control">
              <button type="button" class="stepper-btn" data-target="quote-passengers" data-delta="-1" aria-label="Minder passagiers">&minus;</button>
              <span id="quote-passengers" data-value="1" data-min="1" data-max="12">1</span>
              <button type="button" class="stepper-btn" data-target="quote-passengers" data-delta="1" aria-label="Meer passagiers">+</button>
            </div>
          </div>
          <div class="quote-stepper">
            <label>Bagage</label>
            <div class="stepper-control">
              <button type="button" class="stepper-btn" data-target="quote-luggage" data-delta="-1" aria-label="Minder bagage">&minus;</button>
              <span id="quote-luggage" data-value="1" data-min="0" data-max="6">1</span>
              <button type="button" class="stepper-btn" data-target="quote-luggage" data-delta="1" aria-label="Meer bagage">+</button>
            </div>
          </div>
        </div>

        <button type="button" id="quote-submit" class="btn btn-primary quote-btn">Bekijk vaste prijs</button>

        <div id="quote-result" class="quote-result" hidden></div>
      </div>
